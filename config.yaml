# margin_top / margin_bottom: points stripped from top and bottom of each page
# when extracting chunk text (and images). Increase margin_bottom if footer
# lines still appear after the clip fix; increase margin_top for persistent headers.
manuals:
  "DCS FA-18C Early Access Guide CN":
    margin_top: 55
    margin_bottom: 55
  "DCS_ JF-17 _雷电_":
    margin_top: 55
    margin_bottom: 55
  "F-15C":
    margin_top: 55
    margin_bottom: 55
  "F-16C“蝰蛇”":
    margin_top: 55
    margin_bottom: 55
  default:
    margin_top: 55
    margin_bottom: 55
qdrant_url: "http://localhost:6333"
collection_name: "dcs_manuals"
retrieval:
  hybrid_prefetch: 50
  rerank_top_n: 3
  neighbor_expand: false
generation:
  model: "gemini-2.5-flash-lite"
  provider: "google"
  max_context_tokens: 5000
  max_history_tokens: 1500
  temperature: 0.3
  max_tokens: 3000
  source_extraction:
    model: "gpt-4o-mini"
    provider: "openai"
    temperature: 0
    max_tokens: 1000
  debug_used_chunks: true
data:
  final_dir: "data/final"
frontend:
  # Manual list for `/config` / UI: omit `pdf_options` to auto-list all *.pdf under pdf_dir (sorted).
  pdf_dir: "documents"
  feedback_log_path: "data/feedback_log.jsonl"
router:
  model: "gemini-2.5-flash-lite"
  provider: "google"
  temperature: 0
  max_tokens: 150
  include_reasoning: false
  max_history_rounds: 2
