# margin_top / margin_bottom: points stripped from top and bottom of each page
# when extracting chunk text (and images). Increase margin_bottom if footer
# lines still appear after the clip fix; increase margin_top for persistent headers.
manuals:
  "DCS FA-18C Early Access Guide CN":
    margin_top: 55
    margin_bottom: 55
  "DCS_ JF-17 _雷电_":
    margin_top: 55
    margin_bottom: 55
  "F-15C":
    margin_top: 55
    margin_bottom: 55
  "F-16C“蝰蛇”":
    margin_top: 55
    margin_bottom: 55
  default:
    margin_top: 55
    margin_bottom: 55
qdrant_url: "http://localhost:6333"
collection_name: "dcs_manuals"
retrieval:
  hybrid_prefetch: 50
  rerank_top_n: 10
  neighbor_expand: false
generation:
  model: "gpt-4o-mini"
  max_context_tokens: 6000
  max_history_tokens: 2000
  temperature: 0
data:
  final_dir: "data/final"
frontend:
  pdf_options:
    - "DCS FA-18C Early Access Guide CN.pdf"
    - "DCS_ JF-17 _雷电_.pdf"
    - "F-15C.pdf"
    - "F-16C“蝰蛇”.pdf"
  feedback_log_path: "data/feedback_log.jsonl"
router:
  model: "gpt-4o-mini"
  include_reasoning: true
  max_history_rounds: 2
